<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#0f172a">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>الراجحي للمحاسبة</title>
  <link rel="manifest" href="/alrajehi_offline/manifest.json">
  <link rel="icon" type="image/png" sizes="192x192" href="/alrajehi_offline/icons/icon-192.png">
  <link rel="icon" type="image/png" sizes="512x512" href="/alrajehi_offline/icons/icon-512.png">
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <!-- مكتبات -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <script src="https://unpkg.com/dexie@3.2.4/dist/dexie.min.js"></script>
</head>
<body>
  <div id="loading-screen">
    <div class="loader-container">
      <div class="loader-logo">ر</div>
      <div class="loader-bar"><div class="loader-progress"></div></div>
      <p class="loader-text">جاري تهيئة النظام...</p>
    </div>
  </div>

  <div id="connection-indicator" class="connection-status online" style="display:none;">● متصل</div>
  <div id="toast-container"></div>
  <div id="modal-portal"></div>

  <aside class="sidebar" id="sidebar">
    <div class="sidebar-brand">
      <div class="brand-icon"><svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 3v18h18"/></svg></div>
      <div class="brand-text"><h2>الراجحي</h2><span>نظام المحاسبة الذكي</span></div>
    </div>
    <nav class="sidebar-nav" id="sidebar-nav"></nav>
    <div class="sidebar-footer">
      <div class="user-avatar" id="user-avatar">م</div>
      <span id="user-name-sidebar">مستخدم</span>
    </div>
  </aside>

  <div class="layout">
    <header class="top-bar">
      <button class="menu-toggle" id="menu-toggle"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg></button>
      <div class="page-title-wrapper"><h1 class="page-title" id="page-title">لوحة التحكم</h1><span class="page-subtitle" id="page-subtitle"></span></div>
      <div class="top-actions">
        <button class="icon-btn" id="btn-help"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/></svg></button>
      </div>
    </header>
    <main class="content" id="tab-content"></main>
  </div>

  <nav class="bottom-nav">
    <button class="bottom-item active" data-tab="dashboard"><svg class="bottom-icon" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg><span>الرئيسية</span></button>
    <button class="bottom-item" data-tab="items"><svg class="bottom-icon" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/></svg><span>المواد</span></button>
    <button class="bottom-item" data-tab="sale-invoice"><div class="bottom-fab"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg></div><span>بيع</span></button>
    <button class="bottom-item" data-tab="invoices"><svg class="bottom-icon" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/></svg><span>الفواتير</span></button>
    <button class="bottom-item" data-tab="more"><svg class="bottom-icon" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor"><circle cx="12" cy="12" r="1"/><circle cx="19" cy="12" r="1"/><circle cx="5" cy="12" r="1"/></svg><span>المزيد</span></button>
  </nav>

  <div id="more-menu" class="sheet-overlay" style="display:none;">
    <div class="sheet-backdrop"></div>
    <div class="sheet-content">
      <div class="sheet-handle"></div>
      <div class="sheet-header">القائمة</div>
      <div class="sheet-grid" id="sheet-grid"></div>
    </div>
  </div>

  <script src="js/app-offline.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/alrajehi_offline/service-worker.js');
      });
    }
  </script>
</body>
</html>
